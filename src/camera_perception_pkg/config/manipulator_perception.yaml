object_distance_node:
  ros__parameters:
    detections_topic: /detections

    # YOLO가 color image 기준이면 aligned depth를 써야 함
    depth_image_topic: /camera/camera/aligned_depth_to_color/image_raw
    depth_camera_info_topic: /camera/camera/color/camera_info
    # 만약 아래 토픽이 있으면 이걸 써도 됨
    # depth_camera_info_topic: /camera/camera/aligned_depth_to_color/camera_info

    target_label_prefixes:
      - elevator_btn_2

    target_button_topic: /manipulator_perception/target_button

    base_frame: camera_link
    fallback_camera_frame: camera_color_optical_frame

    depth_unit_scale: 0.001
    depth_min_m: 0.15
    depth_max_m: 3.0

    # 처음 정합 확인할 때는 center가 더 직관적
    depth_mode: center
    roi_sample_grid: 3

    sync_queue: 10
    sync_slop_sec: 0.08

    marker_topic: /object_3d_marker
    point_topic: /object_3d_point
    marker_scale: 0.01
    marker_lifetime_sec: 0.2

    debug_log: true